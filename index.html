  [data-theme="light"] {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #f0f1f4;
    --border: #d4d7de;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --accent: #4f5dd6;
    --fast-track: #16a34a;
    --investigation: #d97706;
    --refinement: #4f5dd6;
    --techdebt: #7c3aed;
    --incident: #dc2626;
    --neutral: #475569;
    --col-active: rgba(79, 93, 214, 0.07);
    --card-shadow: 0 2px 12px rgba(0,0,0,0.1);
    --highlight-rule-bg: rgba(79, 93, 214, 0.06);
    --highlight-problem-bg: rgba(217, 119, 6, 0.06);
    --highlight-blocker-bg: rgba(220, 38, 38, 0.06);
    --tag-ft-bg: rgba(22,163,74,0.1);
    --tag-inv-bg: rgba(217,119,6,0.1);
    --tag-ref-bg: rgba(79,93,214,0.1);
    --tag-td-bg: rgba(124,58,237,0.1);
    --tag-inc-bg: rgba(220,38,38,0.1);
    --tag-mix-bg: rgba(71,85,105,0.1);
    --card-ft-text: #000;
    --card-inv-text: #000;
    --card-ref-text: #fff;
    --card-td-text: #fff;
    --card-inc-text: #fff;
    --card-mix-text: #fff;
    --select-hover: #c4c8d0;
    --focus-ring: rgba(79, 93, 214, 0.15);
    --btn-primary-text: #fff;
  }

  [data-theme="contrast"] {
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #111111;
    --border: #666666;
    --text: #ffffff;
    --text-dim: #d0d0d0;
    --accent: #93a0ff;
    --fast-track: #5eeb95;
    --investigation: #fcd34d;
    --refinement: #93a0ff;
    --techdebt: #d0a8ff;
    --incident: #ff8a8a;
    --neutral: #a8b8cc;
    --col-active: rgba(147, 160, 255, 0.18);
    --card-shadow: 0 0 0 2px #666;
    --highlight-rule-bg: rgba(147, 160, 255, 0.15);
    --highlight-problem-bg: rgba(252, 211, 77, 0.15);
    --highlight-blocker-bg: rgba(255, 138, 138, 0.15);
    --tag-ft-bg: rgba(94,235,149,0.25);
    --tag-inv-bg: rgba(252,211,77,0.25);
    --tag-ref-bg: rgba(147,160,255,0.25);
    --tag-td-bg: rgba(208,168,255,0.25);
    --tag-inc-bg: rgba(255,138,138,0.25);
    --tag-mix-bg: rgba(168,184,204,0.25);
    --card-ft-text: #000;
    --card-inv-text: #000;
    --card-ref-text: #fff;
    --card-td-text: #fff;
    --card-inc-text: #fff;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);

  .app { max-width: 1440px; margin: 0 auto; padding: 24px; }

  header {

    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    min-height: 40px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    white-space: nowrap;
    line-height: 40px;
  }

  .case-selector {
    display: flex;
    gap: 10px;
    align-items: center;
    flex: 1;
    min-width: 300px;
  }

  .case-selector label {

    color: var(--text-dim);
    white-space: nowrap;
    line-height: 40px;

  .case-selector select {

    height: 40px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 36px 0 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    max-width: 600px;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238888a0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 12px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .case-selector select:hover { border-color: var(--select-hover); }

  .case-selector select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--focus-ring);
  }

  [data-theme="light"] .case-selector select {
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  }

  [data-theme="contrast"] .case-selector select {
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23cccccc' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  }

  optgroup { font-weight: 600; color: var(--text-dim); }

  option {
    background: var(--surface);
    color: var(--text);
    padding: 4px 8px;
  }

  [data-theme="light"] option {
    background: #fff;
    color: #1a1a2e;
  }

  .case-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    display: none;
  }

  .case-info.visible { display: block; }

  .case-info h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .case-meta {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .case-meta .tag {
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .tag-fast-track { background: var(--tag-ft-bg); color: var(--fast-track); }
  .tag-investigation { background: var(--tag-inv-bg); color: var(--investigation); }
  .tag-refinement { background: var(--tag-ref-bg); color: var(--refinement); }
  .tag-techdebt { background: var(--tag-td-bg); color: var(--techdebt); }
  .tag-incident { background: var(--tag-inc-bg); color: var(--incident); }
  .tag-mixed { background: var(--tag-mix-bg); color: var(--neutral); }

  .case-description {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-dim);
  }

  .boards-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 24px;
  }

  .board {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    min-width: 0;
  }

  .board-header {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .board-header .board-icon {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .board-columns {
    display: grid;
    min-height: 120px;
    position: relative;
  }

  #refinement-board .board-columns {
    grid-template-columns: repeat(5, 1fr);
  }

  #work-board .board-columns {
    grid-template-columns: repeat(6, 1fr);
  }

  .column {
    border-right: 1px solid var(--border);
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: background 0.3s ease;
    position: relative;
    min-height: 100px;
  }

  .column:last-child { border-right: none; }

  .column.active { background: var(--col-active); }

  .column-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
    transition: color 0.3s ease;
  }

  .column.active .column-name { color: var(--accent); }

  .card-slot {
    width: 100%;
    min-height: 48px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .task-card {
    width: 90%;
    max-width: 160px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    box-shadow: var(--card-shadow);
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0;
    transform: scale(0.8);
    line-height: 1.3;
  }

  .task-card.visible {
    opacity: 1;
    transform: scale(1);
  }

  .task-card .track-badge {
    display: block;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.7;
    margin-bottom: 4px;
  }

  .task-card.fast-track { background: var(--fast-track); color: var(--card-ft-text); }
  .task-card.investigation { background: var(--investigation); color: var(--card-inv-text); }
  .task-card.refinement { background: var(--refinement); color: var(--card-ref-text); }
  .task-card.techdebt { background: var(--techdebt); color: var(--card-td-text); }
  .task-card.incident { background: var(--incident); color: var(--card-inc-text); }
  .task-card.mixed { background: var(--neutral); color: var(--card-mix-text); }

  .external-board {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: none;
  }

  .external-board.visible { display: block; }

  .external-board .board-header .board-icon { background: var(--incident); }

  .external-board .board-columns {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 80px;
  }

  .step-commentary {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    min-height: 60px;
    display: none;
  }

  .step-commentary.visible { display: block; }

  .step-commentary .step-label {
    font-size: 14px;
    line-height: 1.6;
  }

  .step-commentary .step-actor {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .step-commentary .step-highlight {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--highlight-rule-bg);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--accent);
  }

  .step-commentary .step-highlight.problem {
    background: var(--highlight-problem-bg);
    border-left-color: var(--investigation);
    color: var(--investigation);
  }

  .step-commentary .step-highlight.blocker {
    background: var(--highlight-blocker-bg);
    border-left-color: var(--incident);
    color: var(--incident);
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .controls button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button:disabled { opacity: 0.3; cursor: not-allowed; }
  .controls button:disabled:hover { border-color: var(--border); color: var(--text); }

  .controls button.primary {
    background: var(--accent);
    color: var(--btn-primary-text);
    border-color: var(--accent);
  }

  .controls button.primary:hover { opacity: 0.85; color: var(--btn-primary-text); border-color: var(--accent); }
  .controls button.primary:disabled { opacity: 0.3; }

  .step-counter {
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
    display: none;
  }

  .progress-bar.visible { display: block; }

  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 15px;
  }

  .empty-state .arrow { font-size: 24px; margin-bottom: 12px; display: block; }

  .theme-switcher {
    display: flex;
    gap: 4px;
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .theme-switcher button {
    background: none;
    border: none;
    border-radius: 6px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 16px;
    transition: all 0.15s ease;
    position: relative;
  }

  .theme-switcher button:hover { color: var(--text); background: var(--surface2); }

  .theme-switcher button.active {
    background: var(--accent);
    color: var(--btn-primary-text);
  }

  .theme-switcher button svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  [data-theme="contrast"] { font-size: 18px; line-height: 1.6; }

  [data-theme="contrast"] header h1 { font-size: 22px; }

  [data-theme="contrast"] .case-selector label { font-size: 16px; }
  [data-theme="contrast"] .case-selector select {
    font-size: 17px;
    font-weight: 500;
    border-width: 2px;
    height: 48px;
    padding: 0 40px 0 16px;
  }

  [data-theme="contrast"] .case-info { border-width: 2px; padding: 24px; }
  [data-theme="contrast"] .case-info h2 { font-size: 19px; }
  [data-theme="contrast"] .case-description { font-size: 16px; }
  [data-theme="contrast"] .case-meta .tag { font-size: 14px; padding: 5px 12px; }

  [data-theme="contrast"] .board { border-width: 2px; }
  [data-theme="contrast"] .board-header { border-bottom-width: 2px; font-size: 16px; padding: 14px 20px; }
  [data-theme="contrast"] .column { border-right-width: 2px; }
  [data-theme="contrast"] .column-name { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; }
  [data-theme="contrast"] .task-card { font-size: 14px; font-weight: 600; padding: 12px 14px; }
  [data-theme="contrast"] .task-card .track-badge { font-size: 11px; }

  [data-theme="contrast"] .step-commentary { border-width: 2px; padding: 20px 24px; }
  [data-theme="contrast"] .step-commentary .step-label { font-size: 17px; }
  [data-theme="contrast"] .step-commentary .step-actor { font-size: 14px; }
  [data-theme="contrast"] .step-commentary .step-highlight {
    border-left-width: 5px;
    font-size: 16px;
    font-weight: 500;
    padding: 10px 14px;
  }

  [data-theme="contrast"] .controls button {
    border-width: 2px;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 20px;
    min-height: 44px;
    min-width: 44px;
  }
  [data-theme="contrast"] .step-counter { font-size: 15px; }
  [data-theme="contrast"] .progress-bar { height: 5px; }
  [data-theme="contrast"] .empty-state { font-size: 18px; }

  [data-theme="contrast"] .theme-switcher button { width: 44px; height: 44px; }
  [data-theme="contrast"] .theme-switcher button svg { width: 22px; height: 22px; }

  [data-theme="contrast"] *:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  @media (max-width: 900px) {
    html { overflow-x: hidden; }
    body { overflow-x: hidden; max-width: 100vw; }
    .app { padding: 16px; max-width: 100%; overflow: hidden; }
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 12px;
      align-items: center;
    }
    header h1 { font-size: 18px; line-height: 1.3; grid-column: 1; grid-row: 1; }
    .theme-switcher { grid-column: 2; grid-row: 1; margin-left: 0; }
    .case-selector { grid-column: 1 / -1; grid-row: 2; }
    .case-selector { min-width: 0; }
    .case-selector select { max-width: none; }

    .boards-container { overflow: hidden; }
    .board {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      max-width: 100%;
    }
    .board-columns { width: max-content; }
    #refinement-board .board-columns {
      grid-template-columns: repeat(5, 110px);
    }
    #work-board .board-columns {
      grid-template-columns: repeat(6, 110px);
    }

    .column-name { font-size: 10px; }
    .task-card { font-size: 11px; padding: 8px 10px; }

    .controls { gap: 8px; }
    .controls button { padding: 8px 12px; font-size: 12px; }
    .step-counter { margin-left: 0; width: 100%; text-align: right; }
  }

  @media (max-width: 480px) {
    .app { padding: 12px; }
    header h1 { font-size: 16px; }
    .case-selector { flex-direction: column; gap: 6px; align-items: stretch; }
    .case-selector label { line-height: 1; }
    .case-selector select { height: 44px; font-size: 15px; }

    .case-info { padding: 14px; }
    .case-info h2 { font-size: 15px; }
    .case-meta { gap: 8px; }

    .step-commentary { padding: 12px 14px; }
    .step-commentary .step-label { font-size: 13px; }

    .controls { flex-wrap: wrap; }
    .controls button { flex: 1; min-width: 0; justify-content: center; }
    .controls button:last-of-type { flex: 0 0 auto; }
  }
</style>

<body>
<div class="app">
  <header>
    <h1>Process Board Simulator</h1>
    <div class="case-selector">
      <label for="case-select">Кейс:</label>
      <select id="case-select">
        <option value="">Выберите кейс...</option>

function initTheme() {
  const saved = localStorage.getItem('ps-theme');
  let theme = saved;
  if (!theme) {
    theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  if (window.matchMedia('(prefers-contrast: more)').matches && !saved) {
    theme = 'contrast';
  }
  setTheme(theme);
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('ps-theme', theme);
  document.querySelectorAll('.theme-switcher button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.themeBtn === theme);
    btn.setAttribute('aria-checked', btn.dataset.themeBtn === theme);
  });
}

function init() {
  initTheme();
  document.querySelector('.theme-switcher').addEventListener('click', e => {
    const btn = e.target.closest('[data-theme-btn]');
    if (btn) setTheme(btn.dataset.themeBtn);
  });
  populateSelect();
  select.addEventListener('change', onCaseChange);
  btnPrev.addEventListener('click', prevStep);
  btnNext.addEventListener('click', nextStep);
  btnAutoplay.addEventListener('click', toggleAutoplay);
  btnReset.addEventListener('click', reset);
  document.addEventListener('keydown', onKeyDown);
}

function populateSelect() {
  const waves = [
    { label: 'Волна 1 — базовые сценарии', from: 1, to: 12 },
    { label: 'Волна 2 — edge cases', from: 13, to: 22 },
    { label: 'Волна 3 — деградация и масштабирование', from: 23, to: 31 },
    { label: 'Волна 4 — fallback, замещение, эволюция', from: 32, to: 37 }
  ];
  waves.forEach(w => {
    const group = document.createElement('optgroup');
    group.label = w.label;
    CASES.filter(c => c.id >= w.from && c.id <= w.to).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = `#${c.id}: ${c.title}`;
      group.appendChild(opt);
    });
    select.appendChild(group);
  });
}

function onCaseChange() {
  stopAutoplay();
  const id = parseInt(select.value);
  if (!id) { resetUI(); return; }
  currentCase = CASES.find(c => c.id === id);
  currentStep = -1;
  showCaseInfo();
  clearAllCards();
  clearActiveColumns();
  emptyState.style.display = 'none';
  controls.style.display = 'flex';
  progressBar.classList.add('visible');
  updateControls();
  updateProgress();
  stepCommentary.classList.remove('visible');

  const needsExternal = currentCase.steps.some(s => s.board === 'external');
  externalBoard.classList.toggle('visible', needsExternal);
}

function showCaseInfo() {
  const c = currentCase;
  caseInfo.classList.add('visible');
  caseTitle.textContent = `#${c.id}: ${c.title}`;
  caseDescription.textContent = c.description;

  const trackLabels = {
    'fast-track': 'Fast track',
    'investigation': 'Investigation',
    'refinement': 'Refinement',
    'techdebt': 'Техдолг',
    'incident': 'Incident',
    'mixed': 'Смешанный'
  };

  caseMeta.innerHTML = `
    <span class="tag tag-${c.track}">${trackLabels[c.track]}</span>
    <span class="tag" style="background:rgba(255,255,255,0.03);color:var(--text-dim);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0">тип задачи &rarr; определяет маршрут</span>
    <span class="tag" style="background:rgba(255,255,255,0.05);color:var(--text-dim)">Волна ${c.wave}</span>
    <span class="tag" style="background:rgba(255,255,255,0.05);color:var(--text-dim)">${c.steps.length} шагов</span>
  `;
}

function nextStep() {
  if (!currentCase || currentStep >= currentCase.steps.length - 1) return;
  currentStep++;
  renderStep();
  updateControls();
  updateProgress();
}

function prevStep() {
  if (!currentCase || currentStep <= 0) return;
  clearStepVisuals();
  currentStep--;
  renderStep();
  updateControls();
  updateProgress();
}

function renderStep() {
  const step = currentCase.steps[currentStep];
  clearAllCards();
  clearActiveColumns();

  if (step.externalName) {
    externalBoardName.textContent = step.externalName;
    externalColName.textContent = step.externalCol;
    externalBoard.classList.add('visible');
  }

  const col = document.querySelector(`.column[data-board="${step.board}"][data-col="${step.column}"]`);
  if (col) {
    col.classList.add('active');
    const slot = col.querySelector('.card-slot');
    const card = document.createElement('div');
    card.className = `task-card ${currentCase.track}`;
    const trackLabelsMap = {
      'fast-track': 'Fast track',
      'investigation': 'Investigation',
      'refinement': 'Refinement',
      'techdebt': 'Техдолг',
      'incident': 'Incident',
      'mixed': 'Смешанный'
    };
    card.innerHTML = `<span class="track-badge">${trackLabelsMap[currentCase.track]}</span>${currentCase.cardLabel}`;
    slot.appendChild(card);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { card.classList.add('visible'); });
    });
  }

  stepCommentary.classList.add('visible');
  stepLabel.textContent = step.label;
  stepActor.textContent = step.actor ? `Действует: ${step.actor}` : '';

  if (step.highlight) {
    stepHighlight.style.display = 'block';
    stepHighlight.textContent = step.highlight.text;
    stepHighlight.className = 'step-highlight';
    if (step.highlight.type === 'problem') stepHighlight.classList.add('problem');
    if (step.highlight.type === 'blocker') stepHighlight.classList.add('blocker');
  } else {
    stepHighlight.style.display = 'none';
  }
}

function clearStepVisuals() {
  clearAllCards();
  clearActiveColumns();
}

function clearAllCards() {
  document.querySelectorAll('.task-card').forEach(c => c.remove());
}

function clearActiveColumns() {
  document.querySelectorAll('.column.active').forEach(c => c.classList.remove('active'));
}

function updateControls() {
  if (!currentCase) return;
  btnPrev.disabled = currentStep <= 0;
  btnNext.disabled = currentStep >= currentCase.steps.length - 1;
  const total = currentCase.steps.length;
  const cur = currentStep + 1;
  stepCounter.textContent = currentStep >= 0 ? `${cur} / ${total}` : `0 / ${total}`;
}

function updateProgress() {
  if (!currentCase) return;
  const pct = currentCase.steps.length > 0
    ? ((currentStep + 1) / currentCase.steps.length) * 100
    : 0;
  progressFill.style.width = `${Math.max(0, pct)}%`;
}

function toggleAutoplay() {
  if (isAutoplaying) {
    stopAutoplay();
  } else {
    startAutoplay();
  }
}

function startAutoplay() {
  if (!currentCase) return;
  isAutoplaying = true;
  btnAutoplay.innerHTML = '&#9646;&#9646; Пауза';
  if (currentStep >= currentCase.steps.length - 1) {
    currentStep = -1;
    clearAllCards();
    clearActiveColumns();
    stepCommentary.classList.remove('visible');
  }
  autoplayInterval = setInterval(() => {
    if (currentStep >= currentCase.steps.length - 1) {
      stopAutoplay();
      return;
    }
    nextStep();
  }, 1800);
}

function stopAutoplay() {
  isAutoplaying = false;
  btnAutoplay.innerHTML = '&#9654; Автоплей';
  if (autoplayInterval) {
    clearInterval(autoplayInterval);
    autoplayInterval = null;
  }
}

function reset() {
  stopAutoplay();
  if (!currentCase) return;
  currentStep = -1;
  clearAllCards();
  clearActiveColumns();
  stepCommentary.classList.remove('visible');
  updateControls();
  updateProgress();
}

function resetUI() {
  currentCase = null;
  currentStep = -1;
  caseInfo.classList.remove('visible');
  stepCommentary.classList.remove('visible');
  controls.style.display = 'none';
  progressBar.classList.remove('visible');
  externalBoard.classList.remove('visible');
  emptyState.style.display = 'block';
  clearAllCards();
  clearActiveColumns();
}

function onKeyDown(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'r' || e.key === 'R') { reset(); }
}

init();
</script>
</body>
</html>
